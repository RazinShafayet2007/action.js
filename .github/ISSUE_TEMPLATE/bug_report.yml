name: Bug report
description: Report a bug or regression in Action.js.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction when possible.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is happening and what did you expect instead?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps, sample code, or a repo that reproduces the issue.
      placeholder: |
        1. Create an app with ...
        2. Register an action that ...
        3. Run ...
        4. Observe ...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack trace
      description: Paste any relevant error output.
      render: shell
    validations:
      required: false

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 22.17.1
    validations:
      required: false

  - type: input
    id: package-manager
    attributes:
      label: Package manager
      placeholder: e.g. pnpm 10.1.0
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: OS, runtime, adapter, or anything else relevant.
      placeholder: Ubuntu 24.04, Node adapter, local dev server, etc.
    validations:
      required: false
